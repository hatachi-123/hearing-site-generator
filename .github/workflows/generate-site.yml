name: Generate Site with Claude Code

on:
  push:
    paths:
      - 'prompts/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      API_BASE: https://hearing-api.hab-tech.net
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract session info from pushed file
        id: session
        run: |
          # pushされたコミットの差分からプロンプトファイルを特定する
          PROMPT_FILE=$(git diff --name-only HEAD~1 HEAD -- 'prompts/*.md' | head -1)
          
          if [ -z "$PROMPT_FILE" ]; then
            echo "::error::No prompt file found in the latest commit"
            exit 1
          fi
          
          echo "Found prompt file: $PROMPT_FILE"
          SESSION_ID=$(basename "$PROMPT_FILE" .md)
          PROMPT_CONTENT=$(cat "$PROMPT_FILE")
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "prompt_file=$PROMPT_FILE" >> $GITHUB_OUTPUT
          echo "prompt_content<<PROMPT_DELIM" >> $GITHUB_OUTPUT
          echo "$PROMPT_CONTENT" >> $GITHUB_OUTPUT
          echo "PROMPT_DELIM" >> $GITHUB_OUTPUT
          SHORT_ID=$(echo "$SESSION_ID" | cut -c1-8)
          echo "project_name=draft-${SHORT_ID}" >> $GITHUB_OUTPUT

      - name: "Notify: site generation started"
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          curl -s -X POST "$API_BASE/api/callback/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"sessionId\": \"$SESSION_ID\", \"status\": \"generating_site\"}" || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate site with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"

          # プロンプトをファイル経由で渡す（シェル変数展開による破損を防止）
          cat "${{ steps.session.outputs.prompt_file }}" > /tmp/prompt_input.md

          claude -p "
          以下のプロンプトに基づいてWebサイトを生成してください。
          CLAUDE.md の共通ルールを必ず守ること。

          【出力先】
          sites/$SESSION_ID/ ディレクトリに出力してください。

          【プロンプト内容】
          $(cat /tmp/prompt_input.md)
          " --max-turns 15 --model claude-sonnet-4-20250514 --dangerously-skip-permissions

      - name: Verify generated site
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          if [ ! -f "sites/$SESSION_ID/index.html" ]; then
            echo "::error::sites/$SESSION_ID/index.html not found"
            ls -laR sites/ || echo "sites/ directory not found"
            exit 1
          fi
          echo "Site generated successfully"
          ls -laR "sites/$SESSION_ID/"

      - name: Commit generated site
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "sites/$SESSION_ID/"
          git commit -m "Generated site for session $SESSION_ID"
          git push

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          PROJECT_NAME="${{ steps.session.outputs.project_name }}"

          npx wrangler pages project create "$PROJECT_NAME" --production-branch=main 2>/dev/null || echo "Project already exists"

          npx wrangler pages deploy "sites/$SESSION_ID" \
            --project-name="$PROJECT_NAME" \
            --branch=main \
            2>&1 | tee deploy_output.txt

          DRAFT_URL=$(grep -oP 'https://[^\s]+\.pages\.dev' deploy_output.txt | head -1)
          echo "draft_url=$DRAFT_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DRAFT_URL"

      - name: "Notify: deploy success"
        if: success()
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          DRAFT_URL="${{ steps.deploy.outputs.draft_url }}"
          curl -s -X POST "$API_BASE/api/callback/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"sessionId\": \"$SESSION_ID\", \"status\": \"deployed\", \"draftUrl\": \"$DRAFT_URL\"}"

      - name: "Notify: deploy failed"
        if: failure()
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          curl -s -X POST "$API_BASE/api/callback/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"sessionId\": \"$SESSION_ID\", \"status\": \"failed\"}" || true
