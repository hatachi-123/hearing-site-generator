name: Generate Site with Claude Code

on:
  push:
    paths:
      - 'prompts/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      API_BASE: https://hearing-api.hab-tech.net
    steps:
      - uses: actions/checkout@v4

      - name: Extract session info
        id: session
        run: |
          PROMPT_FILE=$(ls -t prompts/*.md | head -1)
          SESSION_ID=$(basename "$PROMPT_FILE" .md)
          PROMPT_CONTENT=$(cat "$PROMPT_FILE")
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "prompt_file=$PROMPT_FILE" >> $GITHUB_OUTPUT
          # プロンプト内容を環境ファイルに保存（複数行対応）
          echo "prompt_content<<PROMPT_DELIM" >> $GITHUB_OUTPUT
          echo "$PROMPT_CONTENT" >> $GITHUB_OUTPUT
          echo "PROMPT_DELIM" >> $GITHUB_OUTPUT

      - name: "Notify: site generation started"
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          curl -s -X POST "$API_BASE/api/callback/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"sessionId\": \"$SESSION_ID\", \"status\": \"generating_site\"}" || true

      - name: Generate site with Claude Code
        id: generate
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          prompt: |
            以下のプロンプトに基づいて、Webサイトを生成してください。

            【出力先】
            sites/${{ steps.session.outputs.session_id }}/ ディレクトリに出力してください。

            【要件】
            - index.html を必ず作成すること
            - CSS は style.css として分離すること
            - 必要に応じて script.js も作成すること
            - レスポンシブ対応（モバイル・タブレット・PC）
            - モダンで洗練されたデザイン
            - 日本語フォント対応（Google Fonts の Noto Sans JP 推奨）
            - OGP メタタグ、favicon 設定も含めること
            - 画像は適切なプレースホルダー（via https://placehold.co）を使用

            【プロンプト内容】
            ${{ steps.session.outputs.prompt_content }}
          claude_args: "--max-turns 15 --model claude-sonnet-4-20250514"

      - name: Commit generated site
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          if [ -d "sites/$SESSION_ID" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "sites/$SESSION_ID/"
            git commit -m "Generated site for session $SESSION_ID"
            git push
          else
            echo "::error::sites/$SESSION_ID directory not found"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          npm install -g wrangler
          wrangler pages deploy "sites/$SESSION_ID" \
            --project-name="draft-site-$SESSION_ID" \
            --branch=main \
            2>&1 | tee deploy_output.txt

          DRAFT_URL=$(grep -oP 'https://[^\s]+\.pages\.dev' deploy_output.txt | head -1)
          echo "draft_url=$DRAFT_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DRAFT_URL"

      - name: "Notify: deploy success"
        if: success()
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          DRAFT_URL="${{ steps.deploy.outputs.draft_url }}"
          curl -s -X POST "$API_BASE/api/callback/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"sessionId\": \"$SESSION_ID\", \"status\": \"deployed\", \"draftUrl\": \"$DRAFT_URL\"}"

      - name: "Notify: deploy failed"
        if: failure()
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SESSION_ID="${{ steps.session.outputs.session_id }}"
          curl -s -X POST "$API_BASE/api/callback/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"sessionId\": \"$SESSION_ID\", \"status\": \"failed\"}" || true
